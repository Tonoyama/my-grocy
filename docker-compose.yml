services:
  grocy:
    image: lscr.io/linuxserver/grocy:latest
    container_name: grocy
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Tokyo
    ports:
      - "9283:80"
    volumes:
      - ./grocy-config:/config
    restart: unless-stopped
  mcp-grocy-api:
    image: ghcr.io/saya6k/mcp-grocy-api:latest
    container_name: mcp-grocy-api
    command: ["tini", "--", "node", "build/index.js"]
    depends_on:
      - grocy
    environment:
      - GROCY_BASE_URL=http://grocy
      - GROCY_APIKEY_VALUE=${GROCY_APIKEY_VALUE}
      - GROCY_ENABLE_SSL_VERIFY=false
      - REST_RESPONSE_SIZE_LIMIT=10000
      - ENABLE_HTTP_SERVER=true
      - HTTP_SERVER_PORT=8080
    ports:
      - "8080:8080"
    restart: unless-stopped
